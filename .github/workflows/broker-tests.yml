name: broker tests

# Guards the classroom broker model: the ACL scoping (operator/team isolation,
# anonymous read-only fleet) over raw TCP, and the MQTT-over-WebSocket path the
# browser dashboard actually uses. Runs when the broker config, ACL, or the
# test scripts change.
on:
  push:
    branches: [main]
    paths:
      - '**/mosquitto*.conf'
      - 'pi/examples/**'
      - '.github/workflows/broker-tests.yml'
  pull_request:
    paths:
      - '**/mosquitto*.conf'
      - 'pi/examples/**'
      - '.github/workflows/broker-tests.yml'
  workflow_dispatch:

jobs:
  broker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Mosquitto + paho-mqtt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mosquitto mosquitto-clients
          sudo systemctl stop mosquitto || true   # the tests spawn their own instances
          python3 -m pip install --quiet paho-mqtt

      - name: ACL model over raw TCP (classroom scoping)
        run: |
          export PATH="/usr/sbin:$PATH"   # mosquitto broker lives here
          ./pi/examples/classroom-mosquitto-demo.sh

      - name: MQTT-over-WebSocket transport (the browser's path)
        run: |
          export PATH="/usr/sbin:$PATH"
          python3 pi/examples/ws-transport-test.py
