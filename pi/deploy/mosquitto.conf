# Pi-appliance broker config — dropped into /etc/mosquitto/conf.d/hub.conf by
# deploy/install.sh. Debian's packaged mosquitto includes conf.d/*.conf and
# runs it under the packaged mosquitto.service, so no custom unit is needed.
#
# This is the appliance variant of the repo-root mosquitto.example.conf (which
# uses cwd-relative paths for the local demo); only the paths differ — the
# listeners + ACL model are identical, and the ACL file itself is shared
# (mosquitto-acl.example.conf, installed to /etc/mosquitto/hub-acl.conf).

# Raw MQTT — rover firmware (esp-mqtt), sim clients, mosquitto_pub/sub.
listener 1883
protocol mqtt

# MQTT-over-WebSocket — the browser dashboard's mqtt.js connects here directly
# (hubd serves the page on :80 but is not itself an MQTT client).
listener 9001
protocol websockets

# Anonymous clients get the top-level (no `user` block) rules in the ACL —
# full read+write on robots/# and pair/#, plus read on fleet/estop. The hub's
# own Wi-Fi is the real boundary, not a login (confirmed 2026-07-13). Only
# `professor` needs a password from hub-passwd, and only for writing
# fleet/estop. Keep allow_anonymous true: rover firmware since 2026-07-13
# sends no credentials at all, and flipping this locks out every board.
allow_anonymous true
password_file /etc/mosquitto/hub-passwd
acl_file /etc/mosquitto/hub-acl.conf
