name: release-hubd

# Laptop builds of hubd — the hub as a single downloadable binary, no Pi
# required: a laptop runs hubd, a rover is pointed at tcp/<laptop-ip>:7447
# (the rover setup page has the field), and the fabric is up.
#
# Publishes two ways:
#   1. ghcr.io/better-robotics/hubd:<platform> — OCI artifacts, the PUBLIC
#      distribution path. GitHub requires auth to download even public
#      release assets and packages from a private repo, with ONE exception:
#      anonymous pulls of public ghcr images/artifacts. The landing page's
#      install.sh (better-robotics.github.io/laptop/) rides that exception.
#      The package must be flipped public once in the org packages UI.
#   2. A rolling GitHub release, tag `hubd-latest` — the authenticated
#      fallback with stable URLs. Deliberately NOT `releases/latest/...`:
#      this repo also cuts Pi image releases (image-v*), and whichever
#      release is newest owns that URL — a rolling tag is immune.
#      `make_latest: false` keeps the image releases as the headline.
#
# The Pi appliance keeps its own paths: build-hubd.yml (fast redeploy),
# build-image.yml (flashable image). Linux laptop builds are static musl —
# glibc-version-independent, and musl (≠ gnu) keeps the bluer/D-Bus dep out
# (it's gated on linux-gnu for provisiond only; see Cargo.toml).

on:
  workflow_dispatch:

permissions:
  contents: write   # create/update the hubd-latest release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-apple-darwin,       runner: macos-latest,     asset: hubd-macos-arm64.tar.gz }
          - { target: x86_64-apple-darwin,        runner: macos-latest,     asset: hubd-macos-x86_64.tar.gz }
          - { target: x86_64-unknown-linux-musl,  runner: ubuntu-latest,    asset: hubd-linux-x86_64.tar.gz }
          - { target: aarch64-unknown-linux-musl, runner: ubuntu-22.04-arm, asset: hubd-linux-arm64.tar.gz }
          - { target: x86_64-pc-windows-msvc,     runner: windows-latest,   asset: hubd-windows-x86_64.zip }
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: pi
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pi
          key: ${{ matrix.target }}
      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build hubd
        run: cargo build --release --target ${{ matrix.target }} --bin hubd
      # Paths are relative to `pi` (defaults.run.working-directory), so the
      # build output is target/… not pi/target/… — the `pi/` prefix would
      # resolve to pi/pi/target and fail. Write the asset to $GITHUB_WORKSPACE
      # so the workspace-relative upload-artifact below finds it.
      # tar.gz (not a bare binary) so the exec bit survives the download.
      - name: Package (tar.gz)
        if: ${{ !contains(matrix.target, 'windows') }}
        run: tar -C target/${{ matrix.target }}/release -czf "$GITHUB_WORKSPACE/${{ matrix.asset }}" hubd
      - name: Package (zip)
        if: contains(matrix.target, 'windows')
        shell: bash
        run: cd target/${{ matrix.target }}/release && 7z a "$GITHUB_WORKSPACE/${{ matrix.asset }}" hubd.exe
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          # Inter-job transfer only — the release + ghcr hold the canonical
          # binaries. Keeps the org's 0.5 GB artifact quota clear.
          retention-days: 1

  # One release step after all builds — parallel matrix jobs racing to create
  # the same release is the failure this stage exists to avoid.
  release:
    needs: build
    runs-on: ubuntu-latest
    # No working-directory: pi here — this job only moves artifacts (dist/ at
    # the workspace root) and pushes; a pi/ cwd would send `cd dist` to pi/dist.
    permissions:
      contents: write   # rolling release
      packages: write   # ghcr push
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: oras-project/setup-oras@v1
      - name: Push binaries to ghcr (anonymous-pull distribution)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          cd dist
          for f in hubd-*; do
            tag="${f#hubd-}"; tag="${tag%.tar.gz}"; tag="${tag%.zip}"
            case "$f" in
              *.zip) mt=application/zip ;;
              *)     mt=application/gzip ;;
            esac
            oras push "ghcr.io/${{ github.repository_owner }}/hubd:$tag" "$f:$mt"
          done
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: hubd-latest
          name: hubd for laptops (rolling)
          make_latest: false
          body: >
            Run the classroom hub on a laptop — no Pi required. Download the
            build for your platform, run `hubd`, and point a rover at
            `tcp/<your-laptop-ip>:7447` via the
            [rover setup page](https://better-robotics.github.io/provision/rover.html).
            Quickstart: https://better-robotics.github.io/laptop/ — the
            dashboard is at http://localhost:8000 once hubd is running.
            Updated on every run of the release-hubd workflow; asset URLs are
            stable.
          files: dist/*
