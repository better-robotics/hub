<!doctype html>
<!-- The captive sheet's landing page (probe 302s point here — hubd.rs).
     One job: release the OS sheet and hand the user to a real browser.
     The dashboard deliberately does NOT load here: Apple's CNA sandboxes
     localStorage away from Safari, so anything a student signs into inside
     the sheet silently vanishes when it closes. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BetterRobotics</title>
<style>
  /* Shared HIG token system — mirrors dashboard.html and the ESP32 hub
     role's own /welcome (robot's wifi_portal.c) so every BetterRobotics
     surface a student ever lands on reads as one product. */
  :root {
    color-scheme: dark;
    --bg: #0d0f12; --surface: #16191d; --ink: #f2f3f5; --ink-muted: #aeb4bd;
    --border: rgba(255,255,255,.10);
    --accent: #00539B; --accent-ink: #fff;
    --radius-lg: 18px; --radius: 12px; --tap: 44px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px; line-height: 1.47; -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .topbar { display: flex; align-items: center; height: 50px; padding: 0 20px; border-bottom: .5px solid var(--border); }
  .topbar h1 { font-size: 17px; font-weight: 600; letter-spacing: -.01em; margin: 0; }
  .topbar .a { font-weight: 700; }
  .topbar .b { font-weight: 400; color: var(--ink-muted); }
  main { max-width: 32rem; margin: 0 auto; padding: 24px 16px 48px; }
  .card {
    background: var(--surface); border: .5px solid var(--border); border-radius: var(--radius-lg);
    padding: 20px; margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,.4), 0 10px 30px -12px rgba(0,0,0,.6);
  }
  .card h2 { font-size: 20px; font-weight: 700; letter-spacing: -.015em; margin: 0 0 6px; }
  .s { color: var(--ink-muted); font-size: 13px; }
  .btn {
    display: block; width: 100%; box-sizing: border-box; text-align: center;
    font: inherit; font-weight: 600; color: var(--accent-ink); text-decoration: none;
    min-height: var(--tap); padding: .75rem .85rem; margin-top: .9rem;
    border: 0; border-radius: var(--radius); background: var(--accent);
    cursor: pointer;
  }
  #after { display: none; }
</style>
</head>
<body>
<header class="topbar"><h1><span class="a">Better</span><span class="b">Robotics</span></h1></header>
<main>
  <div class="card" id="before">
    <h2>Welcome</h2>
    <p class="s">You&rsquo;re connected to the classroom robotics hub.</p>
    <button class="btn" id="go">Accept &amp; continue</button>
  </div>
  <div class="card" id="after" role="status">
    <h2>You&rsquo;re set</h2>
    <p class="s">Open the dashboard in your regular browser, not this
       pop-up &#8212; this pop-up forgets sign-ins when it closes.</p>
    <a class="btn" href="http://10.42.0.1/" target="_blank" rel="noopener">Open the dashboard</a>
  </div>
</main>
<script>
  // Accept NAVIGATES (?done=1) instead of swapping the DOM: the OS captive
  // sheet re-checks captivity only on full-page loads, so a DOM swap leaves
  // the Cancel button un-flipped even though the probes already answer
  // Success. (Learned on the ESP32 portal — robot@f313b57.)
  document.getElementById('go').addEventListener('click', async () => {
    try { await fetch('/captive/ack', { method: 'POST' }); } catch (e) {}
    location.href = '/welcome?done=1';
  });
  if (location.search.indexOf('done=1') >= 0) {
    document.getElementById('before').style.display = 'none';
    document.getElementById('after').style.display = 'block';
  }
</script>
</body>
</html>
