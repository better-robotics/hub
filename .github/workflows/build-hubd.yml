name: build-hubd

# Builds just the hubd binary and uploads it as an artifact. Two consumers:
# dispatched standalone it's the fast redeploy path for a live Pi (consumed
# over serial by tools/deploy-hubd.sh, skipping the image bake), and
# build-image calls it as a job — both paths always ship the identical
# binary. Static musl, so it's glibc-version-independent (runs on Pi OS
# Bookworm's glibc 2.36 regardless of the runner's). The Pi has no toolchain
# by design; CI is where builds happen. Pure Rust HTTP: hubd is the dashboard,
# fleet HTTP, and the device-served Wi-Fi setup (/wifi/*, via nmcli at
# runtime) — no native/dbus deps to link.
on:
  workflow_dispatch:      # standalone: the fast-redeploy artifact
  workflow_call:          # as job 1 of build-image

jobs:
  build:
    runs-on: ubuntu-24.04-arm   # native arm64 — no cross toolchain
    defaults:
      run:
        working-directory: pi
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pi
          # One cache covers ./target (the musl hubd build) plus the cargo
          # registry. Keyed by arch only — never shared across runner archs.
          key: arm64
      # Gates the artifact, not the push: this workflow is what deploy-hubd.sh
      # ships and what build-image bakes, so every binary reaching hardware has
      # passed. Default (gnu) target, not the musl one below — musl-tools isn't
      # installed until the build step, and the suite is pure parsers (`iw`/`ip`
      # output shapes) that no libc choice or real radio changes.
      - name: Test hubd
        run: cargo test --bin hubd
      - name: Build hubd (static aarch64)
        run: |
          # ports.ubuntu.com (arm64's apt mirror — arm64 isn't a primary arch,
          # so even this native-arm64 runner's own packages route through it)
          # has known recurring outages on GitHub-hosted runners, minutes to
          # tens of minutes at a time (github.com/orgs/community/discussions/53201,
          # first hit here 2026-07-15). Retry covers the common short blip;
          # a sustained outage still fails loudly rather than hanging forever.
          n=0
          until [ "$n" -ge 5 ]; do
            sudo apt-get update && sudo apt-get install -y musl-tools && break
            n=$((n + 1))
            echo "apt attempt $n/5 failed — retrying in 30s…"
            sleep 30
          done
          if [ "$n" -ge 5 ]; then
            echo "::error::apt-get install musl-tools failed after 5 attempts — ports.ubuntu.com outage likely still ongoing, see discussions/53201"
            exit 1
          fi
          rustup target add aarch64-unknown-linux-musl
          cargo build --release --target aarch64-unknown-linux-musl --bin hubd
      - uses: actions/upload-artifact@v4
        with:
          name: hubd-arm64
          path: pi/target/aarch64-unknown-linux-musl/release/hubd
          # Consumed within the run (build-image) or same-day (deploy-hubd.sh)
          # — no reason to ride the repo's 90-day default.
          retention-days: 1
