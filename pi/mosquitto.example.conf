# The broker config — the MQTT answer to "is Rust appropriate for the whole
# stack": no. hubd is a Rust HTTP server (dashboard, /fleet, /wifi setup);
# Mosquitto is the C broker every MQTT client — rover, browser,
# sim — talks to directly. No relay in the middle (flipped 2026-07-08, see
# CLAUDE.md § Architecture).
#
# Run:  mosquitto -c mosquitto.example.conf   (mosquitto-passwd.example must
# exist in cwd; examples/classroom-mosquitto-demo.sh generates it).
#
# `chmod 0700 mosquitto-acl.example.conf mosquitto-passwd.example` — mosquitto
# warns (and a future version will refuse to load) a world-readable acl_file
# or password_file; these hold real credentials even in demo form.

# Raw MQTT — rover firmware (esp-mqtt), sim clients, mosquitto_pub/sub.
listener 1883
protocol mqtt

# MQTT-over-WebSocket — the browser dashboard's mqtt.js connects here
# directly. Same port convention mqtt-ai already proved out.
listener 9001
protocol websockets

# Anonymous clients get only the top-level (no `user`/`pattern` block) rules in
# mosquitto-acl.example.conf — public read-only fleet telemetry, nothing else.
# Every other scope (professor, each team — and a team's rover, which shares its
# team's identity) requires a password from mosquitto-passwd.example.
allow_anonymous true
password_file mosquitto-passwd.example
acl_file mosquitto-acl.example.conf
