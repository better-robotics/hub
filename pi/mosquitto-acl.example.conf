# Per-robots/<id> isolation, Mosquitto's native ACL syntax. Loaded via
# mosquitto.example.conf's `acl_file`. Companion: classroom.example.json5 is
# the human-readable *intent*; this file is the mechanical enforcement.
#
# The whole model is "a team owns its subtree" (CONTRACT.md § Discovery &
# isolation). One identity per team, and BOTH the team's browser (controller)
# and its rover (device) authenticate as that identity — so robot-id == team,
# and the physical board's MAC is just telemetry metadata (hardware is metadata,
# never a name; robot/CLAUDE.md). Directional per-channel rules (imu robot→device,
# pwm device→robot) are deliberately dropped: they guard a team spoofing its OWN
# rover's telemetry — not a classroom threat.
#
# Load-bearing design choice (2026-07-08): scoping moved from a Rust relay to the
# broker itself — browsers are direct MQTT clients (mqtt.js), not proxied. That
# holds only if authenticated users get *narrower* access than anonymous, so
# every non-public grant sits behind a `user`/`pattern` block.

# Unauthenticated clients — read-only fleet view (the dashboard's public
# "every robot on this hub, live"). Read-only: no write rule for anonymous.
topic read robots/#

# WebRTC signaling rendezvous: pair/<room>/… is open to everyone — the
# signaling transport is untrusted by design; peers authenticate end-to-end
# via workbench's ECDSA P-256 pair ceremony, and rooms are unguessable UUIDs
# carried by the pairing QR. Two grants because a plain `topic` line scopes
# to anonymous clients only — the pattern line below covers every
# authenticated identity.
topic readwrite pair/#

# Every authenticated identity owns exactly the subtree named by its username:
# team "team1" (its browser AND its rover both connect as team1) → robots/team1/#.
# %u substitution means no per-team blocks and no edits as the class grows —
# provisioning a new team credential is the only step.
pattern readwrite robots/%u/#
pattern readwrite pair/#

# Professor — full fleet control (broader than the per-user pattern).
user professor
topic readwrite robots/#
