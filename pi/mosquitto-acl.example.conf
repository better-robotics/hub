# Mosquitto's native ACL syntax, loaded via mosquitto.example.conf's acl_file.
#
# The classroom's real boundary is the hub's own Wi-Fi perimeter, not a
# login (confirmed 2026-07-13 — see CONTRACT.md § Discovery & isolation):
# every client, authenticated or not, gets full read+write on robots/# and
# pair/#. A robot's name (robots/<name>/…) is a topic address, not a
# credential — the per-identity password/rotate/delete machinery this
# replaced never enforced anything a determined student couldn't already
# read off a card; it just made every fresh board a manual provisioning
# step. The one differentiated identity is `operator`, whose password
# protects exactly the one thing this ACL can't give away for free: the
# fleet-wide emergency stop (CONTRACT.md § Fleet e-stop) — reading the
# engaged state stays open to everyone, engaging/clearing it needs a real
# credential so a stray keypress can't halt or release the room.

topic readwrite robots/#
topic readwrite pair/#
topic read fleet/estop

# Mosquitto's documented ACL semantics (2026-07-16 — live-caught: a signed-in
# operator's dashboard showed zero robots despite the broker log showing
# telemetry flowing): topic lines before any `user` block apply ONLY to
# anonymous, no-username clients. The moment a client authenticates as a
# named user, Mosquitto consults ONLY that user's own block — none of the
# top-level rules carry over. Without this duplication, signing in as
# operator silently DROPPED access from full robots/#+pair/# down to just
# fleet/estop, the opposite of the intended anonymous-plus-estop identity.
user operator
topic readwrite robots/#
topic readwrite pair/#
topic readwrite fleet/estop
