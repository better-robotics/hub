# Directional per-topic permission table, Mosquitto's native ACL syntax — the
# MQTT answer to hub-zenoh's zenoh-acl.example.json5. Loaded via
# mosquitto.example.conf's `acl_file`. Companion: classroom.example.json5 is
# the human-readable *intent* (who gets what scope, and why); this file is
# the mechanical enforcement of that intent, same split as hub-zenoh's
# protocol/README (contract) vs zenoh-acl.example.json5 (enforcement).
#
# Load-bearing design choice (2026-07-08): scoping moved from a Rust relay
# (hubd's old /ws bridge) to the broker itself — browsers are direct MQTT
# clients (mqtt.js) against Mosquitto, not proxied through hubd. That only
# holds if authenticated users get *narrower* access than anonymous ones, so
# every non-public rule below sits behind a `user` block.

# Unauthenticated clients: read-only fleet telemetry — matches the dashboard's
# public "every robot on this hub, live" view (deliberately public, same as
# the old /fleet HTTP endpoint's ACAO *).
topic read robots/+/sys

# Rover fleet — one shared demo credential for the whole fleet (mirrors
# hub-zenoh's ACL demo: one "rover" identity, not per-robot). Real per-device
# identity is still hub#1 future work; this is a real credential, not
# anonymous, unlike hub-zenoh's open router (that compromise exists only
# because zenoh-pico has no usrpwd support — esp-mqtt has no such gap, so MQTT
# starts from a stricter baseline for free).
user rover
topic write robots/+/sys
topic write robots/+/imu
topic read robots/+/pwm
topic read robots/+/led
topic write robots/+/led/reply

# Professor — full fleet control (matches hubd's old Scope::All).
user professor
topic read robots/#
topic write robots/+/pwm
topic write robots/+/led

# Teams — exactly one robot each, read the whole subtree, write only the
# commands a browser is allowed to issue (matches hubd's old Scope::One).
# One block per team; duplicate for each row in classroom.example.json5.
user team1
topic read robots/team1/#
topic write robots/team1/pwm
topic write robots/team1/led

user team2
topic read robots/team2/#
topic write robots/team2/pwm
topic write robots/team2/led
