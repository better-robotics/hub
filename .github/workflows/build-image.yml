name: build-image

# Builds a flashable Raspberry Pi 4 (arm64) image with hubd baked in.
# Result: flash → boot → join the hub's own hub-XXXX Wi-Fi and set the uplink
# from the dashboard → the hub is running. USB-gadget (ssh/serial over USB-C)
# is the headless recovery channel. No ethernet, no on-device build — install
# happens here in CI, where the network lives; the offline Pi never installs
# anything.
#
# No pi-gen (since 2026-07-10): the golden base already exists upstream — the
# official Raspberry Pi OS Lite release, pinned below — so the bake is
# download → loop-mount → customize (pi/image/customize-image.sh), minutes
# instead of a debootstrap. The verify step is the contract that let the
# production method change underneath it.
on:
  workflow_dispatch:        # build on demand
  push:
    tags: ['pi-image-v*']   # tagging pi-image-vN cuts a released .img
                            # ("pi-" routes to pi/image/; "hub" would be
                            # redundant — the repo name carries it)

permissions:
  contents: write           # to attach the .img to a Release

jobs:
  hubd:
    # The same reusable workflow the fast-redeploy path dispatches standalone
    # — the image always ships the identical artifact.
    uses: ./.github/workflows/build-hubd.yml

  image:
    needs: hubd
    # Native arm64: chroot into the arm64 rootfs without qemu/binfmt. (The old
    # ubuntu-22.04 pin was pi-gen's debootstrap constraint — gone with pi-gen.)
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: pi
    env:
      # Pinned official base ("golden") image. Bookworm is the
      # hardware-verified base (glibc 2.36, first-boot 2026-07-10); it lives
      # under oldstable since Trixie became mainline. Bumping the base — new
      # date or Trixie — is a deliberate change here, never a rebuild side
      # effect: update all three values from the .sha256 file next to the
      # image on downloads.raspberrypi.com.
      BASE_IMG: 2026-06-18-raspios-bookworm-arm64-lite
      BASE_URL: https://downloads.raspberrypi.com/raspios_oldstable_lite_arm64/images/raspios_oldstable_lite_arm64-2026-06-19
      BASE_SHA256: df4c6fb0b625204a09ce587f35f01b4d6375cb3ee0f05df71a0eca6c7aeb8f8f
      # key-only login — pubkey baked, no password set
      HUB_SSH_PUBKEY: >-
        ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMalS/trWZcu/jbBu42I1rC8MUe5qR8A5Vnk9lloSQfW jonasneves@Jonass-MacBook-Pro.local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: hubd-arm64
          path: ${{ runner.temp }}/hubd-artifact

      # --- stage artifacts the customization installs into the rootfs ---
      - name: Stage hub files
        run: |
          set -euo pipefail
          # files/ holds only gitignored build artifacts, so git won't
          # materialize the dir on checkout — create it before staging.
          mkdir -p image/stage-hub/00-hub/files
          cp "$RUNNER_TEMP/hubd-artifact/hubd"  image/stage-hub/00-hub/files/hubd
          chmod +x                              image/stage-hub/00-hub/files/hubd
          # Everything else is whatever deploy/payload.tsv lists — the same one
          # list 00-run.sh installs from, 01-run-chroot.sh enables from, and the
          # verify step below asserts against. The manifest ships with them so
          # the bake can read it (see customize-image.sh).
          cp deploy/payload.tsv image/stage-hub/00-hub/files/payload.tsv
          while read -r src dest mode enable on_host; do
            cp "$src" "image/stage-hub/00-hub/files/$(basename "$src")"
          done < <(grep -Ev '^[[:space:]]*(#|$)' deploy/payload.tsv)
          ls -l image/stage-hub/00-hub/files

      - name: Fetch base image
        run: |
          curl -fSL -o "$RUNNER_TEMP/base.img.xz" "$BASE_URL/$BASE_IMG.img.xz"
          echo "$BASE_SHA256  $RUNNER_TEMP/base.img.xz" | sha256sum -c
          xz -d "$RUNNER_TEMP/base.img.xz"
          mv "$RUNNER_TEMP/base.img" "$RUNNER_TEMP/hub.img"

      - name: Customize image
        run: |
          sudo apt-get update && sudo apt-get install -y zerofree
          sudo --preserve-env=HUB_SSH_PUBKEY image/customize-image.sh "$RUNNER_TEMP/hub.img"

      - name: Verify customizations are in the image
        run: |
          set -euo pipefail
          IMG="$RUNNER_TEMP/hub.img"
          echo "image: $IMG"
          LOOP=$(sudo losetup -fP --show "$IMG")
          sudo mkdir -p /mnt/hub
          sudo mount "${LOOP}p2" /mnt/hub
          echo "=== /opt/hub ===" && sudo ls -l /mnt/hub/opt/hub
          sudo test -f /mnt/hub/opt/hub/hubd                                          # router binary baked (the one non-manifest file — see payload.tsv)
          sudo test -f /mnt/hub/etc/NetworkManager/system-connections/usb-gadget.nmconnection
          sudo chroot /mnt/hub dpkg-query -W network-manager                          # NM present (drives /wifi setup)
          # Every payload.tsv row landed in the rootfs, and every unit it marks
          # `enable` is enabled. Derived from the manifest the bake installed
          # from, so this can't drift into asserting a stale list — which is the
          # whole point: a unit added to the manifest is verified for free, and
          # one that silently didn't install fails the build here.
          echo "=== payload ==="
          PAYLOAD_MD=""
          while read -r src dest mode enable on_host; do
            sudo test -f "/mnt/hub$dest" || { echo "MISSING from image: $dest (from $src)"; exit 1; }
            if [ "$enable" = yes ]; then
              sudo test -L "/mnt/hub/etc/systemd/system/multi-user.target.wants/$(basename "$dest")" \
                || { echo "NOT ENABLED in image: $(basename "$dest")"; exit 1; }
              boot="enabled"
            else
              boot="—"
            fi
            echo "  ✓ $dest"
            PAYLOAD_MD+="| \`$dest\` | \`$mode\` | $boot |"$'\n'
          done < <(grep -Ev '^[[:space:]]*(#|$)' deploy/payload.tsv)
          # Every package 00-packages declares is actually installed — and its
          # version comes back from the image's own dpkg, not from a list here.
          PKGS_MD=""
          while read -r p; do
            v=$(sudo chroot /mnt/hub dpkg-query -W -f '${Version}' "$p") \
              || { echo "DECLARED BUT NOT INSTALLED: $p"; exit 1; }
            PKGS_MD+="| \`$p\` | \`$v\` |"$'\n'
          done < <(grep -Ev '^[[:space:]]*(#|$)' image/stage-hub/00-hub/00-packages)
          ! sudo chroot /mnt/hub dpkg-query -W comitup 2>/dev/null                    # comitup gone
          # Appliance diet (01-run-chroot.sh) — absences are contract too:
          ! sudo chroot /mnt/hub dpkg-query -W bluez 2>/dev/null                      # no bluetooth stack
          ! sudo chroot /mnt/hub dpkg-query -W dphys-swapfile 2>/dev/null             # no swap on the SD
          ! sudo chroot /mnt/hub dpkg-query -W triggerhappy 2>/dev/null               # no hotkey daemon
          ! sudo chroot /mnt/hub dpkg-query -W firmware-atheros 2>/dev/null           # uncontracted radio firmware gone...
          sudo chroot /mnt/hub dpkg-query -W firmware-brcm80211 firmware-realtek      # ...the contracted radios' stays
          # usb0 recovery-link fixes (both hardware-discovered on the 2026-07-10 first boot):
          sudo test -f /mnt/hub/etc/NetworkManager/conf.d/10-usb0-managed.conf        # NM must manage usb0 (udev defaults g_ether to unmanaged)
          sudo test -f /mnt/hub/etc/NetworkManager/dnsmasq-shared.d/10-usb0-no-route.conf  # never capture the laptop's default route/DNS
          sudo test -f /mnt/hub/etc/mosquitto/hub-passwd                          # instructor's placeholder credential seeded
          sudo test -f /mnt/hub/etc/NetworkManager/dnsmasq-shared.d/20-ap-capport.conf  # option-114 dashboard advertisement (AP leg only)
          # Base config — customize-image.sh owns what pi-gen used to (since 2026-07-10):
          sudo chroot /mnt/hub getent passwd pi                                       # first user baked
          sudo test -f /mnt/hub/home/pi/.ssh/authorized_keys                          # key-only ssh: key present...
          sudo grep -q 'PasswordAuthentication no' /mnt/hub/etc/ssh/sshd_config.d/10-hub-pubkey-only.conf  # ...password auth off...
          sudo test ! -e /mnt/hub/etc/ssh/sshd_config.d/rename_user.conf              # ...and the stock ssh-blocks-until-wizard gate gone
          sudo test -L /mnt/hub/etc/systemd/system/multi-user.target.wants/ssh.service          # sshd enabled
          sudo test ! -e /mnt/hub/etc/systemd/system/multi-user.target.wants/userconfig.service # first-boot wizard off
          sudo grep -qx hub /mnt/hub/etc/hostname                                     # hub.local presupposes this
          echo "hubd:" && sudo file /mnt/hub/opt/hub/hubd                             # static musl aarch64
          # config.txt/cmdline.txt live on the FAT boot partition (p1), not the
          # rootfs (p2): on a running Pi /boot/firmware is a mount point, but in
          # the raw image these files are on p1, so check the dwc2 overlay there.
          sudo mkdir -p /mnt/boot
          sudo mount "${LOOP}p1" /mnt/boot
          sudo grep -q 'dtoverlay=dwc2,dr_mode=peripheral' /mnt/boot/config.txt        # gadget overlay, PERIPHERAL mode (host-mode stock line must not satisfy this)
          sudo grep -q 'dtoverlay=disable-bt' /mnt/boot/config.txt                    # BT hardware off (stack is purged; silence the kernel probes too)
          sudo grep -q 'modules-load=dwc2' /mnt/boot/cmdline.txt                      # gadget modules (boot part)
          sudo umount /mnt/boot
          # --- Bill of materials for the run page ("what's actually on this
          # card" — the question a flashed image raises, previously answerable
          # only by expanding this log). Written HERE, while the image is still
          # mounted, so every line is something just observed in the .img: the
          # payload table is the manifest rows verified above, the arch is
          # `file` output, the sizes are measured, the versions come from the
          # image's own dpkg. A later step, after the unmount, could only
          # describe a card it never read — which is how a summary drifts into
          # confidently restating a stale hardcoded list.
          HUBD_FILE=$(sudo file -b /mnt/hub/opt/hub/hubd)
          HUBD_SIZE=$(sudo du -h  /mnt/hub/opt/hub/hubd     | cut -f1)
          IDE_SIZE=$( sudo du -sh /mnt/hub/usr/share/hub/ide | cut -f1)
          ROOT_USED=$(df -h --output=used /mnt/hub | tail -1 | tr -d ' ')
          {
            echo "## What's on this card"
            echo
            echo "| | |"
            echo "|---|---|"
            echo "| base | \`$BASE_IMG\` |"
            echo "| rootfs used | $ROOT_USED |"
            echo "| \`hubd\` | $HUBD_SIZE — $HUBD_FILE |"
            echo "| \`ide\` bundle | $IDE_SIZE at \`/usr/share/hub/ide\`, served at \`/ide/\` |"
            echo
            echo "### Payload"
            echo
            echo "Every row of [\`pi/deploy/payload.tsv\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${GITHUB_SHA}/pi/deploy/payload.tsv),"
            echo "verified present in the image above. It is the one list \`deploy/install.sh\`,"
            echo "the bake, and the checks all read — add a unit there and it appears here."
            echo
            echo "| installed at | mode | at boot |"
            echo "|---|---|---|"
            printf '%s' "$PAYLOAD_MD"
            echo
            echo "### Packages"
            echo
            echo "| added | version |"
            echo "|---|---|"
            printf '%s' "$PKGS_MD"
            echo
            echo "Removed (appliance diet): see \`01-run-chroot.sh\` — each absence is asserted above."
          } >> "$GITHUB_STEP_SUMMARY"
          sudo umount /mnt/hub && sudo losetup -d "$LOOP"
          echo "✓ image: hubd + usb-gadget recovery, base config owned by customize-image.sh"

      # Compress after verify (verify reads the raw .img — no decompress round-trip).
      - name: Compress image
        run: xz -T0 "$RUNNER_TEMP/hub.img"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: hub-image
          path: ${{ runner.temp }}/hub.img.xz
          # The released .img lives on the Release; this copy exists only so a
          # workflow_dispatch run (no Release) is downloadable the same day.
          # ~470 MB against the 0.5 GB org quota — never let it accumulate.
          retention-days: 1

      # A downloaded .img.xz loses all repo context in someone's Downloads
      # folder, so the released asset carries the full name the tag can omit.
      - name: Name the release asset
        if: startsWith(github.ref, 'refs/tags/pi-image-v')
        run: cp "$RUNNER_TEMP/hub.img.xz" "$GITHUB_WORKSPACE/hub-${GITHUB_REF_NAME}.img.xz"

      - name: Attach image to Release
        if: startsWith(github.ref, 'refs/tags/pi-image-v')
        uses: softprops/action-gh-release@v2
        with:
          files: hub-${{ github.ref_name }}.img.xz
