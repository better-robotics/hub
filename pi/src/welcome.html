<!doctype html>
<!-- The captive sheet's landing page (probe 302s point here — hubd.rs).
     One job: release the OS sheet and hand the user to a real browser.
     The dashboard deliberately does NOT load here: Apple's CNA sandboxes
     localStorage away from Safari, so anything a student signs into inside
     the sheet silently vanishes when it closes. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BetterRobotics</title>
<style>
  /* Same encoded vocabulary as the dashboard this page hands off to, and as
     robot's portal pages (wifi_portal.c HEAD): the base <button> IS the
     neutral tile so a classless button can't render UA-grey, tiers are
     classes, sizes come from tokens only, --tap applies under a finger only.
     Values copied from canonical hub/dashboard.html (hub@f005439 converged
     them with better-robotics.github.io + workbench) — keep in sync on touch.
     One page, so no .list-group/.stack here; add them from the dashboard if
     this ever grows a list. */
  :root {
    color-scheme: dark;
    --bg: #1a1d20; --surface: #212529; --inset: #2a3037;
    --ink: #e9ecef; --ink-muted: #adb5bd; --ink-faint: #8b929b;
    --border: rgba(255,255,255,0.10);
    --accent: #00539B; --accent-ink: #ffffff; --focus: #4aa3d6;
    --radius-lg: 14px; --radius: 8px; --tap: 44px; --ctrl-h: 2.2rem;
    --fs-body: 0.85rem;
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px; line-height: 1.47; -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .topbar { display: flex; align-items: center; height: 50px; padding: 0 20px; border-bottom: .5px solid var(--border); }
  .topbar h1 { font-size: 17px; font-weight: 600; letter-spacing: -.01em; margin: 0; }
  .topbar .a { font-weight: 700; }
  .topbar .b { font-weight: 400; color: var(--ink-muted); }
  main { max-width: 32rem; margin: 0 auto; padding: 24px 16px 48px; }
  .card {
    background: var(--surface); border: .5px solid var(--border); border-radius: var(--radius-lg);
    padding: 20px; margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,.4), 0 10px 30px -12px rgba(0,0,0,.6);
  }
  .card h2 { font-size: 20px; font-weight: 700; letter-spacing: -.015em; margin: 0 0 6px; }
  .s { color: var(--ink-muted); font-size: 13px; }
  /* Base control = the neutral tile; tiers layer on. */
  button, .btn {
    cursor: pointer; font: inherit; font-size: var(--fs-body); font-weight: 600;
    min-height: var(--ctrl-h); padding: .4rem .8rem;
    border-radius: var(--radius); border: .5px solid var(--border);
    color: var(--ink); background: var(--inset);
    transition: filter .15s ease, transform .08s ease;
  }
  button:hover, .btn:hover { filter: brightness(1.25); }
  button:active, .btn:active { transform: scale(.97); }
  .btn { display: block; width: 100%; text-align: center; text-decoration: none; margin-top: .9rem; }
  .btn-primary { color: var(--accent-ink); background: var(--accent); border-color: transparent; }
  :focus-visible { outline: 2px solid var(--focus); outline-offset: 1px; }
  @media (pointer: coarse) { button, .btn { min-height: var(--tap); } }
</style>
</head>
<body>
<header class="topbar"><h1><span class="a">Better</span><span class="b">Robotics</span></h1></header>
<main>
  <div class="card" id="before">
    <h2>Welcome</h2>
    <p class="s">You&rsquo;re connected to the classroom robotics hub.</p>
    <button class="btn btn-primary" id="go">Accept &amp; continue</button>
  </div>
  <div class="card" id="after" role="status" hidden>
    <h2>You&rsquo;re set</h2>
    <p class="s">Open the dashboard in your regular browser, not this
       pop-up &#8212; this pop-up forgets sign-ins when it closes.</p>
    <a class="btn btn-primary" href="http://10.42.0.1/" target="_blank" rel="noopener">Open the dashboard</a>
  </div>
</main>
<script>
  // Accept NAVIGATES (?done=1) instead of swapping the DOM: the OS captive
  // sheet re-checks captivity only on full-page loads, so a DOM swap leaves
  // the Cancel button un-flipped even though the probes already answer
  // Success. (Learned on the ESP32 portal — robot@f313b57.)
  document.getElementById('go').addEventListener('click', async () => {
    try { await fetch('/captive/ack', { method: 'POST' }); } catch (e) {}
    location.href = '/welcome?done=1';
  });
  if (location.search.indexOf('done=1') >= 0) {
    document.getElementById('before').hidden = true;
    document.getElementById('after').hidden = false;
  }
</script>
</body>
</html>
